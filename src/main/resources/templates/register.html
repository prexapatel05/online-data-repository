<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - DataHub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <div class="logo">
                    <div class="logo-icon"><img src="/images/small-logo.png" alt="DataHub Logo"></div>
                    <span class="logo-text">DataHub</span>
                </div>
                <h1>Create your account</h1>
                <p>Join our dataset platform</p>
            </div>

            <!-- Error Message -->
            <div th:if="${error}" class="alert alert-error">
                <span th:text="${error}"></span>
            </div>
            <div th:if="${passwordError}" class="alert alert-error">
                <span th:text="${passwordError}"></span>
            </div>

            <form th:action="@{/register}" method="post" th:object="${registerRequest}">

                <div class="form-row">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" th:field="*{fullName}" placeholder="Enter your name">
                        <div th:if="${#fields.hasErrors('fullName')}" class="field-error">
                            <span th:errors="*{fullName}"></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" th:field="*{email}" placeholder="Enter your email">
                        <div th:if="${#fields.hasErrors('email')}" class="field-error">
                            <span th:errors="*{email}"></span>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" th:field="*{password}" placeholder="Create password">
                        <div th:if="${#fields.hasErrors('password')}" class="field-error">
                            <span th:errors="*{password}"></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" th:field="*{confirmPassword}" placeholder="Confirm password">
                        <div th:if="${#fields.hasErrors('confirmPassword')}" class="field-error">
                            <span th:errors="*{confirmPassword}"></span>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Create Account</button>

                <div class="form-footer">
                    Already have an account? <a th:href="@{/login}">Login here</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
