<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DataHub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="login-container">
        <!-- Left Panel -->
        <!-- Left Panel -->
        <div class="login-left">
            <div class="logo-image">
                <div class="db-icon">
                    <img src="/images/logo-image.png" alt="DataHub Logo" class="logo-image">
                </div>
            </div>
            <h2>DataHub</h2>
            <p class="tagline">Secure &bull; Scalable &bull; Research-Ready</p>
        </div>

        <!-- Right Panel -->
        <div class="login-right">
            <h1>Welcome to our Data Repository Application</h1>
            <p class="subtitle">Sign in to your account to continue</p>

            <!-- Success Message -->
            <div th:if="${param.logout}" class="alert alert-success" style="max-width:400px;width:100%;">
                You have been logged out successfully.
            </div>
            <div th:if="${success}" class="alert alert-success" style="max-width:400px;width:100%;">
                <span th:text="${success}"></span>
            </div>

            <!-- Error Message -->
            <div th:if="${param.error}" class="alert alert-error" style="max-width:400px;width:100%;">
                Invalid email or password. Please try again.
            </div>

            <form class="login-form" th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <div class="form-options">
                    <label>
                        <input type="checkbox" name="remember-me"> Remember me
                    </label>
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary">Login</button>

                <div class="form-footer">
                    Don't have an account?<br>
                    <a th:href="@{/register}">Register here</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
