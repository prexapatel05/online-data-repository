<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial, sans-serif; color: #1f2937; line-height: 1.5;">
    <h3 style="color:#0f3656;">New rating on your dataset</h3>
    <p>Hi <strong th:text="${recipientName}">User</strong>,</p>
    <p>
        <strong th:text="${actorName}">Someone</strong>
        <span th:text="${actionLabel}">rated your dataset</span>
        <strong th:text="${datasetName}">Dataset</strong>.
    </p>
    <p>Rating: <strong th:text="${ratingValue}">5</strong>/5</p>
    <p><a th:href="${datasetUrl}">View discussion</a></p>
</body>
</html>
