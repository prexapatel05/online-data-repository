<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datasets - DataHub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar('datasets')}"></div>

    <div class="main-content">
        <div th:replace="~{fragments/header :: header}"></div>

        <div class="page-content">
            <div class="breadcrumb">
                <a th:href="@{/dashboard}">Home</a>
                <i data-lucide="chevron-right" class="breadcrumb-sep"></i>
                <span>Datasets</span>
            </div>

            <div class="page-head" style="margin-top: 8px;">
                <div>
                    <h1 class="page-title">Browse Datasets</h1>
                    <p class="page-subtitle">Discover public and authorized datasets available to your account.</p>
                </div>
                <a th:href="@{/upload}" class="btn-next btn-inline browse-head-action">
                    <i data-lucide="upload-cloud"></i>
                    Upload Dataset
                </a>
            </div>

            <form method="get" th:action="@{/datasets}" class="datasets-browser-card" style="margin-top: 16px;">
                <div class="datasets-toolbar">
                    <div class="browse-search-field">
                        <i data-lucide="search" class="browse-field-icon"></i>
                        <input id="search" name="search" th:value="${search}" placeholder="Search datasets, descriptions, or tags">
                    </div>

                    <div class="browse-sort-field">
                        <i data-lucide="arrow-up-down" class="browse-field-icon"></i>
                        <select id="sort" name="sort" aria-label="Sort datasets">
                            <option value="recent" th:selected="${sort == 'recent'}">Recently Uploaded</option>
                            <option value="views" th:selected="${sort == 'views'}">Most Viewed</option>
                            <option value="alpha" th:selected="${sort == 'alpha'}">Alphabetical (A-Z)</option>
                            <option value="rating" th:selected="${sort == 'rating'}">Highest Rated</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-next browse-apply-btn">Apply Filters</button>
                    <a class="btn-next btn-light browse-reset-btn" th:href="@{/datasets}">Reset</a>
                </div>

                <details class="browse-filter-details" th:attr="open=${hasDatasetFilters ? 'open' : null}">
                    <summary class="browse-filter-summary">
                        <span class="browse-summary-label"><i data-lucide="filter"></i> Filters</span>
                        <span class="browse-summary-hint">Category, owner, format, visibility</span>
                    </summary>

                    <div class="browse-filter-panel">
                        <div class="browse-filter-grid">
                            <div class="form-group">
                                <label for="category">Category</label>
                                <select id="category" name="category">
                                    <option value="">All categories</option>
                                    <option th:each="cat : ${browseCategories}" th:value="${cat}" th:selected="${category == cat}" th:text="${cat}">Category</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="ownerSearch">Owner</label>
                                <input id="ownerSearch" type="text" th:value="${selectedOwnerLabel}" list="ownerOptions" placeholder="Search owner by name or username" autocomplete="off">
                                <input id="ownerId" name="ownerId" type="hidden" th:value="${ownerId}">
                                <datalist id="ownerOptions">
                                    <option value=""></option>
                                    <option th:each="owner : ${owners}"
                                            th:value="${owner.fullName != null && !owner.fullName.isBlank() ? owner.fullName + ' (@' + owner.username + ')' : owner.username + ' (@' + owner.username + ')'}"
                                            th:attr="data-owner-id=${owner.userId}"></option>
                                </datalist>
                            </div>
                            <div class="form-group">
                                <label for="format">Format</label>
                                <select id="format" name="format">
                                    <option value="">All formats</option>
                                    <option value="CSV" th:selected="${format == 'CSV'}">CSV</option>
                                    <option value="TSV" th:selected="${format == 'TSV'}">TSV</option>
                                    <option value="XLSX" th:selected="${format == 'XLSX'}">Excel</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="visibility">Visibility</label>
                                <select id="visibility" name="visibility">
                                    <option value="">All visibility</option>
                                    <option value="PUBLIC" th:selected="${visibility == 'PUBLIC'}">Public</option>
                                    <option value="AUTHORIZED" th:selected="${visibility == 'AUTHORIZED'}">Authorized</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </details>
            </form>

            <script th:inline="javascript">
                document.addEventListener('DOMContentLoaded', function () {
                    var ownerSearch = document.getElementById('ownerSearch');
                    var ownerId = document.getElementById('ownerId');
                    var ownerOptions = Array.prototype.slice.call(document.querySelectorAll('#ownerOptions option[data-owner-id]'));

                    if (!ownerSearch || !ownerId) {
                        return;
                    }

                    function syncOwnerId() {
                        var match = ownerOptions.find(function (option) {
                            return option.value === ownerSearch.value;
                        });
                        ownerId.value = match ? match.getAttribute('data-owner-id') : '';
                    }

                    ownerSearch.addEventListener('input', syncOwnerId);
                    ownerSearch.addEventListener('change', syncOwnerId);
                    syncOwnerId();
                });
            </script>

            <div class="section-header" style="margin-top: 20px;">
                <h3>Results (<span th:text="${totalItems}">0</span>)</h3>
            </div>

            <div class="dataset-grid">
                <a th:each="dataset : ${datasets}" th:href="@{'/datasets/' + ${dataset.datasetId}}" class="dataset-card" style="text-decoration:none; color:inherit;">
                    <div class="dataset-card-header">
                        <h3 th:text="${dataset.name}">Dataset</h3>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span class="badge badge-default" th:text="${dataset.accessLevel}">PUBLIC</span>
                            <span style="font-size: 0.85rem; color: #666;" th:if="${datasetStats[dataset.datasetId]}">
                                <i data-lucide="eye" style="width: 14px; height: 14px; display: inline;"></i>
                                <span th:text="${datasetStats[dataset.datasetId].viewCount}">0</span>
                            </span>
                            <span style="font-size: 0.85rem; color: #666;" th:if="${datasetStats[dataset.datasetId]}">
                                <i data-lucide="file" style="width: 14px; height: 14px; display: inline;"></i>
                                <span th:text="${datasetStats[dataset.datasetId].fileType}">CSV</span>
                            </span>
                        </div>
                    </div>
                    <p th:text="${dataset.description != null ? (dataset.description.length() > 110 ? dataset.description.substring(0,110) + '...' : dataset.description) : 'No description available'}"></p>
                    <div class="dataset-tags" th:if="${dataset.tag != null && !dataset.tag.isBlank()}">
                        <span class="tag" th:each="tag, iter : ${dataset.tag.split(',')}" th:if="${iter.index < 3}" th:text="${tag.trim()}">tag</span>
                    </div>
                    <div class="dataset-card-footer">
                        <div class="dataset-stats">
                            <span><i data-lucide="download"></i> <span th:if="${datasetStats[dataset.datasetId]}" th:text="${datasetStats[dataset.datasetId].downloadCount}">0</span><span th:unless="${datasetStats[dataset.datasetId]}">--</span></span>
                            <span><i data-lucide="calendar"></i> <span th:text="${#temporals.format(dataset.createdAt, 'MMM dd')}"/></span>
                        </div>
                        <span class="dataset-author">by <strong th:text="${dataset.user.fullName != null ? dataset.user.fullName : dataset.user.username}"></strong></span>
                    </div>
                </a>

                <div th:if="${#lists.isEmpty(datasets)}" class="dataset-card" style="grid-column: 1/-1; text-align:center; padding:40px;">
                    <p style="color:#6b7c8a;">No datasets found for current filters.</p>
                </div>
            </div>

            <div class="upload-actions" style="margin-top: 16px;" th:if="${totalPages > 1}">
                <a class="btn-next btn-light" th:if="${currentPage > 0}" th:href="@{/datasets(page=${currentPage - 1}, search=${search}, category=${category}, ownerId=${ownerId}, format=${format}, visibility=${visibility}, sort=${sort})}">Previous</a>
                <span class="step-note">Page <span th:text="${currentPage + 1}"></span> of <span th:text="${totalPages}"></span></span>
                <a class="btn-next btn-light" th:if="${currentPage + 1 < totalPages}" th:href="@{/datasets(page=${currentPage + 1}, search=${search}, category=${category}, ownerId=${ownerId}, format=${format}, visibility=${visibility}, sort=${sort})}">Next</a>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
<script>lucide.createIcons();</script>
</body>
</html>
